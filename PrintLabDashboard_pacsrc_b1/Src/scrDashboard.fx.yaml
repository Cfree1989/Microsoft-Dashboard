scrDashboard As screen:
    OnVisible: |-
        =Set(varActor, {
            '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
            Claims: "i:0#.f|membership|" & varMeEmail,
            Discipline: "",
            DisplayName: varMeName,
            Email: varMeEmail,
            JobTitle: "",
            Picture: ""
        })

    recHeader As rectangle:
        Fill: =RGBA(45, 45, 48, 1)
        Height: =60
        Width: =Parent.Width
        ZIndex: =1

    lblAppTitle As label:
        Color: =Color.White
        Font: =varAppFont
        FontWeight: =FontWeight.Semibold
        Height: =30
        Size: =18
        Text: ="Print Lab Dashboard"
        Width: =300
        X: =20
        Y: =15
        ZIndex: =2

    btnNavDashboard As button:
        Color: =Color.White
        Fill: =If(varCurrentPage = "Dashboard", varColorPrimary, varNavBtnInactiveFill)
        FocusedBorderThickness: =varFocusedBorderThickness
        Font: =varAppFont
        Height: =36
        HoverFill: =If(varCurrentPage = "Dashboard", ColorFade(varColorPrimary, -15%), varNavBtnHoverFill)
        OnSelect: =Set(varCurrentPage, "Dashboard")
        PressedFill: =If(varCurrentPage = "Dashboard", ColorFade(varColorPrimary, -25%), ColorFade(varNavBtnHoverFill, -10%))
        Text: ="Dashboard"
        Width: =120
        X: =300
        Y: =12
        ZIndex: =3

    btnNavAdmin As button:
        Color: =Color.White
        Fill: =If(varCurrentPage = "Admin", varColorPrimary, varNavBtnInactiveFill)
        FocusedBorderThickness: =varFocusedBorderThickness
        Font: =varAppFont
        Height: =36
        HoverFill: =If(varCurrentPage = "Admin", ColorFade(varColorPrimary, -15%), varNavBtnHoverFill)
        OnSelect: =Notify("Admin features coming soon!", NotificationType.Information)
        PressedFill: =If(varCurrentPage = "Admin", ColorFade(varColorPrimary, -25%), ColorFade(varNavBtnHoverFill, -10%))
        Text: ="Admin"
        Width: =120
        X: =430
        Y: =12
        ZIndex: =4

    btnNavAnalytics As button:
        Color: =Color.White
        Fill: =If(varCurrentPage = "Analytics", varColorPrimary, varNavBtnInactiveFill)
        FocusedBorderThickness: =varFocusedBorderThickness
        Font: =varAppFont
        Height: =36
        HoverFill: =If(varCurrentPage = "Analytics", ColorFade(varColorPrimary, -15%), varNavBtnHoverFill)
        OnSelect: =Notify("Analytics features coming soon!", NotificationType.Information)
        PressedFill: =If(varCurrentPage = "Analytics", ColorFade(varColorPrimary, -25%), ColorFade(varNavBtnHoverFill, -10%))
        Text: ="Analytics"
        Width: =120
        X: =560
        Y: =12
        ZIndex: =5

    lblUserName As label:
        Align: =Align.Right
        Color: =varColorBorder
        Font: =varAppFont
        Height: =24
        Size: =12
        Text: =varMeName
        Width: =200
        X: =Parent.Width - 216
        Y: =18
        ZIndex: =6

    galStatusTabs As gallery.galleryHorizontal:
        DelayItemLoading: =true
        Height: =50
        Items: |-
            =Table(
                {Status: "Uploaded", Color: RGBA(33, 150, 243, 1)},
                {Status: "Pending", Color: RGBA(212, 160, 0, 1)},
                {Status: "Ready to Print", Color: RGBA(46, 125, 50, 1)},
                {Status: "Printing", Color: RGBA(117, 67, 171, 1)},
                {Status: "Completed", Color: RGBA(33, 150, 243, 1)},
                {Status: "Paid & Picked Up", Color: RGBA(46, 125, 50, 1)},
                {Status: "Rejected", Color: RGBA(219, 3, 3, 1)},
                {Status: "Canceled", Color: RGBA(138, 136, 134, 1)},
                {Status: "Archived", Color: RGBA(96, 94, 92, 1)}
            )
        LoadingSpinner: =LoadingSpinner.Data
        TemplatePadding: =3
        TemplateSize: =varTabGalleryHeight
        Width: =Parent.Width
        Y: =60
        ZIndex: =7

        btnStatusTab As button:
            BorderColor: =varInputBorderColor
            Color: |-
                =If(
                    varSelectedStatus = ThisItem.Status, 
                    If(ThisItem.Status = "Pending", Color.Black, Color.White),
                    varColorText
                )
            Fill: =If(varSelectedStatus = ThisItem.Status, ThisItem.Color, RGBA(245, 245, 245, 1))
            FocusedBorderColor: =varColorPrimary
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            HoverColor: =If(varSelectedStatus = ThisItem.Status, If(ThisItem.Status = "Pending", Color.Black, Color.White), varColorText)
            HoverFill: =ColorFade(If(varSelectedStatus = ThisItem.Status, ThisItem.Color, RGBA(245, 245, 245, 1)), -10%)
            OnSelect: =Set(varSelectedStatus, ThisItem.Status)
            PressedColor: =If(varSelectedStatus = ThisItem.Status, If(ThisItem.Status = "Pending", Color.Black, Color.White), varColorText)
            PressedFill: =ColorFade(If(varSelectedStatus = ThisItem.Status, ThisItem.Color, RGBA(245, 245, 245, 1)), -20%)
            Size: =11
            Text: =ThisItem.Status & " " & Text(CountRows(Filter(PrintRequests, Status.Value = ThisItem.Status)))
            Width: =138
            X: =5
            Y: =4
            ZIndex: =1

    lblEmptyState As label:
        Align: =Align.Center
        Color: =varColorTextLight
        Font: =varAppFont
        Height: =100
        Size: =14
        Text: ="No " & varSelectedStatus & " requests found"
        Visible: =CountRows(galJobCards.AllItems) = 0
        Width: =400
        X: =(Parent.Width - 400) / 2
        Y: =350
        ZIndex: =8

    galJobCards As gallery.galleryVertical:
        DelayItemLoading: =true
        Height: =Parent.Height - 160
        Items: |-
            =SortByColumns(
                Filter(
                    PrintRequests,
                    // Filter by selected status tab (use .Value for Choice fields)
                    Status.Value = varSelectedStatus,
                    // Search filter (searches name and email)
                    If(
                        IsBlank(varSearchText), 
                        true, 
                        varSearchText in Student.DisplayName || varSearchText in StudentEmail || varSearchText in ReqKey
                    ),
                    // Needs attention filter
                    If(varNeedsAttention, NeedsAttention = true, true)
                ),
                "NeedsAttention", SortOrder.Descending,  // Attention items first (true > false)
                "Created", SortOrder.Ascending            // Then oldest first (longest in queue)
            )
        Layout: =Layout.Vertical
        LoadingSpinner: =LoadingSpinner.Data
        TemplatePadding: =8
        TemplateSize: =varCardGalleryHeight
        Width: =Parent.Width
        WrapCount: =4
        Y: =160
        ZIndex: =9

        recCardBackground As rectangle:
            BorderColor: =If(ThisItem.NeedsAttention, RGBA(255, 180, 0, 1), varColorBorderLight)
            BorderThickness: =If(ThisItem.NeedsAttention, 2, 1)
            Fill: =If(ThisItem.NeedsAttention, RGBA(255, 235, 180, 1), varColorBgCard)
            Height: =Parent.TemplateHeight - 8
            OnSelect: =Select(Parent)
            Width: =Parent.TemplateWidth
            Y: =8
            ZIndex: =2

        lblStudentName As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =24
            OnSelect: =Select(Parent)
            Size: =14
            Text: =ThisItem.Student.DisplayName
            Width: =Parent.TemplateWidth - 50
            X: =12
            Y: =14
            ZIndex: =3

        lblSubmittedTime As label:
            Align: =Align.Right
            Color: =varColorDanger
            Font: =varAppFont
            Height: =44
            OnSelect: =Select(Parent)
            Size: =8
            Text: |-
                =If(
                    DateDiff(ThisItem.Created, Now(), TimeUnit.Minutes) < 1,
                    "Just now",
                    "Submitted " &
                    If(
                        DateDiff(ThisItem.Created, Now(), TimeUnit.Days) > 0,
                        Text(DateDiff(ThisItem.Created, Now(), TimeUnit.Days)) & "d ",
                        ""
                    ) &
                    If(
                        Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Hours), 24) > 0,
                        Text(Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Hours), 24)) & "h ",
                        ""
                    ) &
                    Text(Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Minutes), 60)) & "m ago"
                )
            Width: =99
            X: =200
            Y: =8
            ZIndex: =4

        lblFilename As label:
            Color: =varColorTextMuted
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =9
            Text: =ThisItem.Student.DisplayName & "_" & ThisItem.Method.Value & "_" & ThisItem.Color.Value
            Width: =Parent.TemplateWidth - 24
            X: =13
            Y: =70
            ZIndex: =5

        lblStudentEmail As label:
            Color: =varColorTextMuted
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =9
            Text: ="✉ " & ThisItem.StudentEmail
            Width: =Parent.TemplateWidth / 2 - 16
            X: =13
            Y: =47
            ZIndex: =6

        lblPrinter As label:
            Color: =varColorTextMuted
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: ="🖨 " & Trim(If(Find("(", ThisItem.Printer.Value) > 0, Left(ThisItem.Printer.Value, Find("(", ThisItem.Printer.Value) - 1), ThisItem.Printer.Value))
            Width: =99
            X: =101
            Y: =97
            ZIndex: =7

        lblColor As label:
            Color: |-
                =Switch(
                    ThisItem.Color.Value,
                    "Black", RGBA(26, 26, 26, 1),
                    "White", RGBA(180, 180, 180, 1),
                    "Gray", RGBA(128, 128, 128, 1),
                    "Red", RGBA(204, 0, 0, 1),
                    "Orange", RGBA(255, 102, 0, 1),
                    "Yellow", RGBA(255, 215, 0, 1),
                    "Green", RGBA(76, 175, 80, 1),
                    "Forest Green", RGBA(34, 139, 34, 1),
                    "Blue", RGBA(0, 102, 204, 1),
                    "Purple", RGBA(107, 63, 160, 1),
                    "Brown", RGBA(93, 64, 55, 1),
                    "Chocolate Brown", RGBA(123, 63, 0, 1),
                    "Copper", RGBA(184, 115, 51, 1),
                    "Bronze", RGBA(205, 127, 50, 1),
                    "Silver", RGBA(192, 192, 192, 1),
                    "Clear", RGBA(245, 245, 245, 1),
                    "Any", RGBA(224, 224, 224, 1),
                    RGBA(153, 153, 153, 1)
                )
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =10
            Text: ="⬤ " & ThisItem.Color.Value
            X: =13
            Y: =97
            ZIndex: =8

        lblEstimates As label:
            Color: =varColorTextMuted
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =10
            Text: |-
                =If(
                    ThisItem.Status.Value = "Paid & Picked Up" && !IsBlank(ThisItem.FinalCost),
                    // After payment: show final weight and cost only
                    "⚖ " & Text(ThisItem.FinalWeight) & "g · 💲" & Text(ThisItem.FinalCost, "[$-en-US]#,##0.00"),
                    // Before payment: show estimates
                    If(
                        !IsBlank(ThisItem.EstimatedWeight),
                        "⚖ " & Text(ThisItem.EstimatedWeight) & "g" &
                        If(!IsBlank(ThisItem.EstimatedTime), " · ⏱ ~" & Text(ThisItem.EstimatedTime) & "h", "") &
                        If(!IsBlank(ThisItem.EstimatedCost), " · 💲" & Text(ThisItem.EstimatedCost, "[$-en-US]#,##0.00"), ""),
                        ""
                    )
                )
            Visible: =!IsBlank(ThisItem.EstimatedWeight) || !IsBlank(ThisItem.FinalWeight)
            Width: =Parent.TemplateWidth - 24
            X: =12
            Y: =122
            ZIndex: =9

        btnViewNotes As button:
            BorderColor: =varSecondaryBtnBorderColor
            BorderThickness: =2
            Color: =varColorNeutral
            Fill: =ColorFade(varColorNeutral, varSecondaryFade)
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =25
            HoverFill: =ColorFade(varColorNeutral, 55%)
            OnSelect: |-
                =Set(varShowNotesModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorNeutral, 45%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =9
            Text: ="Staff Notes"
            Width: =75
            X: =242
            Y: =73
            ZIndex: =10

        lblJobId As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: =ThisItem.ReqKey
            Width: =120
            X: =80
            Y: =189
            ZIndex: =11

        lblcreated As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =28
            OnSelect: =Select(Parent)
            Size: =8
            Text: |-
                =Text(ThisItem.Created, "mmm dd, yyyy hh:mm AM/PM")
            Width: =98
            X: =Parent.TemplateWidth / 2 + 55
            Y: =181
            ZIndex: =12

        lblDetailsHeader As label:
            Color: =varColorText
            Font: =varAppFont
            FontWeight: =FontWeight.Semibold
            Height: =20
            OnSelect: =Select(Parent)
            Size: =11
            Text: ="Details"
            X: =12
            Y: =165
            ZIndex: =13

        lblJobIdLabel As label:
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: ="Job ID"
            Width: =65
            X: =12
            Y: =189
            ZIndex: =14

        lblCreatedLabel As label:
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: |-
                ="Created:"
            Width: =55
            X: =Parent.TemplateWidth / 2
            Y: =185
            ZIndex: =15

        lblDisciplineLabel As label:
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =20
            Size: =8
            Text: |-
                ="Discipline:"
            Width: =65
            X: =12
            Y: =213
            ZIndex: =16

        lblDiscipline As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: =ThisItem.Discipline.Value
            Width: =120
            X: =80
            Y: =213
            ZIndex: =17

        lblProjectTypeLabel As label:
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: |-
                ="Project:"
            Width: =50
            X: =167
            Y: =213
            ZIndex: =18

        lblProjectType As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: =ThisItem.ProjectType.Value
            Width: =99
            X: =219
            Y: =213
            ZIndex: =19

        lblCourseLabel As label:
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: |-
                ="Course:"
            Width: =65
            X: =12
            Y: =237
            ZIndex: =20

        lblCourse As label:
            Color: =varColorText
            Font: =varAppFont
            Height: =20
            OnSelect: =Select(Parent)
            Size: =8
            Text: =Coalesce(Text(ThisItem.'Course Number'), "—")
            X: =80
            Y: =237
            ZIndex: =21

        icoLightbulb As icon.Lightbulb:
            Color: =If(ThisItem.NeedsAttention, RGBA(255, 215, 0, 1), RGBA(180, 180, 180, 1))
            Height: =24
            Icon: =Icon.Lightbulb
            OnSelect: |-
                =Patch(PrintRequests, ThisItem, {NeedsAttention: !ThisItem.NeedsAttention});
                // When marking as needing attention, play notification sound (Reset + true so it plays)
                If(!ThisItem.NeedsAttention, Reset(audNotification); Set(varPlaySound, true))
            Tooltip: =If(ThisItem.NeedsAttention, "Mark as handled", "Mark as needing attention")
            Width: =24
            X: =Parent.TemplateWidth - 30
            Y: =16
            ZIndex: =22

        btnApprove As button:
            BorderColor: =varSecondaryBtnBorderColor
            BorderThickness: =2
            Color: =varColorSuccess
            Fill: =ColorFade(varColorSuccess, varSecondaryFade)
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverFill: =ColorFade(varColorSuccess, 55%)
            OnSelect: |-
                =Set(varShowApprovalModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorSuccess, 45%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: ="✓ Approve"
            Width: =(Parent.TemplateWidth - 40) / 3
            X: =12
            Y: =Parent.TemplateHeight - varBtnHeight - 12
            ZIndex: =23

        btnReject As button:
            BorderColor: =varColorDanger
            BorderThickness: =varInputBorderThickness
            Color: =varColorDanger
            Fill: =Color.White
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverColor: =Color.White
            HoverFill: =varColorDanger
            OnSelect: |-
                =Set(varShowRejectModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorDanger, -15%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: ="✗ Reject"
            Visible: =Or(ThisItem.Status.Value = "Uploaded", ThisItem.Status.Value = "Pending")
            Width: =(Parent.TemplateWidth - 40) / 3
            X: =12 + (Parent.TemplateWidth - 40) / 3 + 4
            Y: =Parent.TemplateHeight - varBtnHeight - 12
            ZIndex: =24

        btnArchive As button:
            BorderColor: =varSecondaryBtnBorderColor
            BorderThickness: =2
            Color: =varColorWarning
            Fill: =ColorFade(varColorWarning, varSecondaryFade)
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverFill: =ColorFade(varColorWarning, 55%)
            OnSelect: |-
                =Set(varShowArchiveModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorWarning, 45%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: ="📦 Archive"
            Visible: =ThisItem.Status.Value in ["Completed", "Paid & Picked Up", "Rejected"]
            Width: =(Parent.TemplateWidth - 40) / 3
            X: =12 + ((Parent.TemplateWidth - 40) / 3 + 8) * 2
            Y: =360
            ZIndex: =25

        btnStartPrint As button:
            BorderColor: =Color.Transparent
            Color: =Color.White
            Fill: =varColorPrimary
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverFill: =ColorFade(varColorPrimary, -15%)
            OnSelect: |-
                =// === SHOW LOADING ===
                Set(varIsLoading, true);
                Set(varLoadingMessage, "Starting print...");
                
                // Store reference to current item before async operations
                Set(varCurrentItem, ThisItem);
                
                Patch(PrintRequests, varCurrentItem, {
                    Status: LookUp(Choices(PrintRequests.Status), Value = "Printing"),
                    LastAction: LookUp(Choices(PrintRequests.LastAction), Value = "Status Change"),
                    LastActionAt: Now(),
                    LastActionBy: {
                        Claims: "i:0#.f|membership|" & User().Email,
                        Discipline: "",
                        DisplayName: User().FullName,
                        Email: User().Email,
                        JobTitle: "",
                        Picture: ""
                    }
                });
                
                'Flow-(C)-Action-LogAction'.Run(
                    Text(varCurrentItem.ID),      // RequestID
                    "Status Change",              // Action
                    "Status",                     // FieldName
                    "Printing",                   // NewValue
                    varMeEmail                    // ActorEmail
                );
                
                Notify("Print started!", NotificationType.Success);
                
                // === HIDE LOADING ===
                Set(varIsLoading, false);
                Set(varLoadingMessage, "")
            PressedFill: =ColorFade(varColorPrimary, -25%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: ="Start Print"
            Visible: =ThisItem.Status.Value = "Ready to Print"
            Width: =Parent.TemplateWidth - 24
            X: =12
            Y: =Parent.TemplateHeight - varBtnHeight - 12
            ZIndex: =26

        btnComplete As button:
            BorderColor: =Color.Transparent
            BorderThickness: =0
            Color: =Color.White
            Fill: =varColorPrimary
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverFill: =ColorFade(varColorPrimary, -15%)
            PressedFill: =ColorFade(varColorPrimary, -25%)
            OnSelect: |-
                =// === SHOW LOADING ===
                Set(varIsLoading, true);
                Set(varLoadingMessage, "Completing print...");
                
                // Store reference to current item before async operations
                Set(varCurrentItem, ThisItem);
                
                Patch(PrintRequests, varCurrentItem, {
                    Status: LookUp(Choices(PrintRequests.Status), Value = "Completed"),
                    LastAction: LookUp(Choices(PrintRequests.LastAction), Value = "Status Change"),
                    LastActionAt: Now(),
                    LastActionBy: {
                        Claims: "i:0#.f|membership|" & User().Email,
                        Discipline: "",
                        DisplayName: User().FullName,
                        Email: User().Email,
                        JobTitle: "",
                        Picture: ""
                    }
                });
                
                'Flow-(C)-Action-LogAction'.Run(
                    Text(varCurrentItem.ID),      // RequestID
                    "Status Change",              // Action
                    "Status",                     // FieldName
                    "Completed",                  // NewValue
                    varMeEmail                    // ActorEmail
                );
                
                Notify("Marked as completed!", NotificationType.Success);
                
                // === HIDE LOADING ===
                Set(varIsLoading, false);
                Set(varLoadingMessage, "")
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: ="✓ Complete"
            Visible: =ThisItem.Status.Value = "Printing"
            Width: =(Parent.TemplateWidth - 28) / 2
            X: =12
            Y: =Parent.TemplateHeight - varBtnHeight - 12
            ZIndex: =27

        btnPickedUp As button:
            BorderColor: =Color.Transparent
            BorderThickness: =0
            Color: =Color.White
            Fill: =varColorSuccess
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varBtnHeight
            HoverFill: =ColorFade(varColorSuccess, -15%)
            OnSelect: |-
                =Set(varShowPaymentModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorSuccess, -25%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =varBtnFontSize
            Text: =If(ThisItem.Status.Value = "Printing", "Partial Payment", "Picked Up")
            Visible: =ThisItem.Status.Value in ["Printing", "Completed"]
            Width: =(Parent.TemplateWidth - 28) / 2
            X: =169
            Y: =Parent.TemplateHeight - varBtnHeight - 12
            ZIndex: =28

        btnEditDetails As button:
            BorderColor: =varSecondaryBtnBorderColor
            BorderThickness: =2
            Color: =varColorPrimary
            Fill: =ColorFade(varColorPrimary, varSecondaryFade)
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =20
            HoverFill: =ColorFade(varColorPrimary, 55%)
            OnSelect: |-
                =Set(varShowDetailsModal, ThisItem.ID);
                Set(varSelectedItem, ThisItem)
            PressedFill: =ColorFade(varColorPrimary, 45%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
            RadiusTopLeft: =varBtnBorderRadius
            RadiusTopRight: =varBtnBorderRadius
            Size: =8
            Text: ="✏️ Edit"
            Visible: =ThisItem.Status.Value <> "Pending"
            Width: =55
            X: =70
            Y: =167
            ZIndex: =29

        btnFiles As button:
            BorderColor: =varColorPrimary
            BorderThickness: =varInputBorderThickness
