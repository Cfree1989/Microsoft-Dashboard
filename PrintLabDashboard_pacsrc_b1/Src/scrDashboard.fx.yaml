                                        },
                                        datetime & " - " & If(isPartial, "PARTIAL PAYMENT", "PAYMENT") & Char(10) &
                                        staffName & Char(10) &
                                        "Transaction #" & transNum & " - " & amountPart & 
                                        If(!IsBlank(noteText), " - """ & noteText & """", "") &
                                        Char(10) & Char(10)
                                    )
                                )
                            )
                        )
                    ),
                    Value
                )
