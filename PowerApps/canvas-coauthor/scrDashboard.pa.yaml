                  OnSelect: |-
                    =Set(varShowDetailsModal, 0);
                    Set(varSelectedItem, Blank());
                    Reset(ddDetailsStaff);
                    Reset(ddDetailsSlicedOnComputer);
                    Reset(ddDetailsMethod);
                    Reset(ddDetailsPrinter);
