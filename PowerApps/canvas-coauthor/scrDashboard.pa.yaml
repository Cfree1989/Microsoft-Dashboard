                                "$" & Text(
                                    If(chkDetailsOwnMaterial.Value, baseCost * varOwnMaterialDiscount, baseCost),
                                    "[$-en-US]#,##0.00"
                                ) & If(chkDetailsOwnMaterial.Value, " (70% off)", "")
                            )
                        )
                    )
