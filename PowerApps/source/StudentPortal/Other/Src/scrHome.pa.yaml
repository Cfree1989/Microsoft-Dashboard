Screens:
  scrHome:
    Properties:
      Fill: =varColorBg
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - conHeaderHome:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.Transparent
            Height: =varHeaderHeight
            Width: =Parent.Width
          Children:
            - recHeaderBgHome:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorHeader
                  Height: =Parent.Height
                  Width: =Parent.Width
            - lblHeaderTitleHome:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(51, 51, 51, 1)
                  Font: =varAppFont
                  FontWeight: =FontWeight.Bold
                  Height: =30
                  Size: =24
                  Text: ="Student Portal"
                  Width: =300
                  X: =20
                  Y: =15
      - conWelcome:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.Transparent
            Height: =80
            Width: '=Parent.Width    '
            Y: =varHeaderHeight + 30
          Children:
            - lblWelcome:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =varColorText
                  Font: =varAppFont
                  FontWeight: =FontWeight.Bold
                  Height: =70
                  Size: =24
                  Text: ="Welcome, " & First(Split(varMeName, " ")).Value & "!"
                  Width: =Parent.Width
            - lblSubtitle:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =varColorTextMuted
                  Font: =varAppFont
                  Height: =30
                  Size: =14
                  Text: ="What would you like to do today?"
                  Visible: =false
                  Width: =Parent.Width
                  Y: =lblWelcome.Y + lblWelcome.Height
      - conActionCards:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(255, 255, 255, 1)
            Height: =350
            Width: =Parent.Width - (varSpacingXL * 2)
            X: =varSpacingXL
            Y: =conWelcome.Y + conWelcome.Height + 30
          Children:
            - conSubmitCard:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =varColorBorderLight
                  BorderThickness: =1
                  Fill: =Color.White
                  Height: =Parent.Height
                  RadiusBottomLeft: =varRadiusMedium
                  RadiusBottomRight: =varRadiusMedium
                  RadiusTopLeft: =varRadiusMedium
                  RadiusTopRight: =varRadiusMedium
                  Width: =(Parent.Width - 80) / 2
                Children:
                  - icnSubmit:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorPrimary
                        Height: =80
                        Icon: =Icon.Add
                        Width: =80
                        X: =(Parent.Width - 80) / 2
                        Y: =40
                  - lblSubmitTitle:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorText
                        Font: =varAppFont
                        FontWeight: =FontWeight.Semibold
                        Height: =30
                        Size: =16
                        Text: ="Submit New Request"
                        Width: '=Parent.Width    '
                        Y: =icnSubmit.Y + icnSubmit.Height + 20
                  - lblSubmitDesc:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorTextMuted
                        Font: =varAppFont
                        Height: =50
                        Size: =12
                        Text: ="Upload your 3D model file and submit a new print request"
                        Width: =Parent.Width - (varSpacingLG * 2)
                        X: =varSpacingLG
                        Y: =lblSubmitTitle.Y + lblSubmitTitle.Height + 8
                  - btnGetStarted:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =Color.Transparent
                        BorderThickness: =0
                        Color: =Color.White
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =varColorPrimary
                        FocusedBorderThickness: =varFocusedBorderThickness
                        Font: =varAppFont
                        FontWeight: =FontWeight.Bold
                        Height: =varBtnHeightLarge
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(varColorPrimary, -15%)
                        OnSelect: =Navigate(scrSubmit, ScreenTransition.Fade)
                        PressedBorderColor: =Self.Fill
                        PressedColor: =Self.Fill
                        PressedFill: =ColorFade(varColorPrimary, -25%)
                        RadiusBottomLeft: =varRadiusSmall
                        RadiusBottomRight: =varRadiusSmall
                        RadiusTopLeft: =varBtnBorderRadius
                        RadiusTopRight: =varRadiusSmall
                        Size: =14
                        Text: ="GET STARTED"
                        Width: =Parent.Width - (varSpacingLG * 2)
                        X: =varSpacingLG
                        Y: =Parent.Height - 70
            - conRequestsCard:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  BorderColor: =varColorBorderLight
                  BorderThickness: =1
                  Fill: =Color.White
                  Height: =Parent.Height
                  RadiusBottomLeft: =varRadiusMedium
                  RadiusBottomRight: =varRadiusMedium
                  RadiusTopLeft: =varRadiusMedium
                  RadiusTopRight: =varRadiusMedium
                  Width: =(Parent.Width - 80) / 2
                  X: =Parent.Width - conSubmitCard.Width
                Children:
                  - icnRequests:
                      Control: Classic/Icon@2.5.0
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorSuccess
                        Height: =80
                        Icon: =Icon.DetailList
                        Width: =80
                        X: =(Parent.Width - 80) / 2
                        Y: =40
                  - lblRequestsTitle:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorText
                        Font: =varAppFont
                        FontWeight: =FontWeight.Semibold
                        Height: =30
                        Size: =16
                        Text: ="My Requests"
                        Width: =Parent.Width
                        Y: =icnRequests.Y + icnRequests.Height + 20
                  - lblRequestsDesc:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Color: =varColorTextMuted
                        Font: =varAppFont
                        Height: =50
                        Text: ="View status, confirm estimates, or manage your existing requests"
                        Width: =Parent.Width - (varSpacingLG * 2)
                        X: =varSpacingLG
                        Y: =lblRequestsTitle.Y + lblRequestsTitle.Height + 8
                  - btnViewRequests:
                      Control: Classic/Button@2.2.0
                      Properties:
                        BorderColor: =Color.Transparent
                        BorderThickness: =0
                        Color: =Color.White
                        DisabledBorderColor: =RGBA(166, 166, 166, 1)
                        Fill: =varColorSuccess
                        FocusedBorderThickness: =varFocusedBorderThickness
                        Font: =varAppFont
                        FontWeight: =FontWeight.Bold
                        Height: =varButtonHeight
                        HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                        HoverColor: =RGBA(255, 255, 255, 1)
                        HoverFill: =ColorFade(varColorSuccess, -15%)
                        OnSelect: =Navigate(scrMyRequests, varScreenTransition)
                        PressedBorderColor: =Self.Fill
                        PressedColor: =Self.Fill
                        PressedFill: =ColorFade(varColorSuccess, -25%)
                        RadiusBottomLeft: =varBtnBorderRadius
                        RadiusBottomRight: =varBtnBorderRadius
                        RadiusTopLeft: =varBtnBorderRadius
                        RadiusTopRight: =varBtnBorderRadius
                        Size: =14
                        Text: ="VIEW REQUESTS"
                        Width: =Parent.Width - (varSpacingLG * 2)
                        X: =varSpacingLG
                        Y: =Parent.Height - 70
      - lblHelpText:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =RGBA(0, 18, 107, 1)
            Font: =varAppFont
            Height: =30
            Size: =11
            Text: ="Need help? Visit " & varPickupLocation & " or email " & varSupportEmail
            Width: =Parent.Width
            Y: =Parent.Height - varNavHeight - 50
      - conNavBarHome:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.Transparent
            Height: =varNavHeight
            Width: =Parent.Width
            Y: =Parent.Height - varNavHeight
          Children:
            - recNavBgHome:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorHeader
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Height: =Parent.Height
                  Width: '=Parent.Width    '
            - btnNavHomeActive:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varColorInfo
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorPrimary, -15%)
                  OnSelect: =// Already on this screen
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="Home"
                  Width: =(Parent.Width - 80) / 3
                  X: =varSpacingXL
                  Y: =(Parent.Height - Self.Height) / 2
            - btnNavSubmitHome:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varNavBtnInactiveFill
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varNavBtnHoverFill
                  OnSelect: =Navigate(scrSubmit, varScreenTransition)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="New Request"
                  Width: =(Parent.Width - 80) / 3
                  X: =(Parent.Width - Self.Width) / 2
                  Y: =(Parent.Height - Self.Height) / 2
            - btnNavMyRequestsHome:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varNavBtnInactiveFill
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varNavBtnHoverFill
                  OnSelect: =Navigate(scrMyRequests, varScreenTransition)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="My Requests"
                  Width: =(Parent.Width - 80) / 3
                  X: =Parent.Width - Self.Width - varSpacingXL
                  Y: =(Parent.Height - Self.Height) / 2
