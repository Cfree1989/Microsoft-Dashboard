Screens:
  scrSubmit:
    Properties:
      Fill: =varColorBg
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - conHeader:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            BorderStyle: =BorderStyle.None
            Fill: =Color.Transparent
            Height: =varHeaderHeight
            Width: '=Parent.Width    '
          Children:
            - recHeaderBg:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorHeader
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Height: =Parent.Height
                  Width: =Parent.Width
            - lblHeaderTitle:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =RGBA(51, 51, 51, 1)
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  FontWeight: =FontWeight.Bold
                  Height: =30
                  Size: =24
                  Text: ="Submit 3D Print Request"
                  Width: =Parent.Width - 40
                  X: =varSpacingXL
                  Y: =(Parent.Height - Self.Height) / 2
      - conNavBar:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.Transparent
            Height: =varNavHeight
            Width: =Parent.Width
            Y: =Parent.Height - varNavHeight
          Children:
            - recNavBg:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorHeader
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Height: =Parent.Height
                  Width: =Parent.Width
            - btnNavHome:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varNavBtnInactiveFill
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varNavBtnHoverFill
                  OnSelect: =Navigate(scrHome, varScreenTransition)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="Home"
                  Width: =(Parent.Width - 80) / 3
                  X: =varSpacingXL
                  Y: =(Parent.Height - Self.Height) / 2
            - btnNavSubmit:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varColorInfo
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorPrimary, -15%)
                  OnSelect: =// Already on this screen
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="New Request"
                  Width: =(Parent.Width - 80) / 3
                  X: =(Parent.Width - Self.Width) / 2
                  Y: =(Parent.Height - Self.Height) / 2
            - btnNavMyRequests:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varNavBtnInactiveFill
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =varButtonHeightSmall
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varNavBtnHoverFill
                  OnSelect: =Navigate(scrMyRequests, varScreenTransition)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =varRadiusSmall
                  RadiusBottomRight: =varRadiusSmall
                  RadiusTopLeft: =varRadiusSmall
                  RadiusTopRight: =varRadiusSmall
                  Text: ="My Requests"
                  Width: =(Parent.Width - 80) / 3
                  X: =Parent.Width - Self.Width - varSpacingXL
                  Y: =(Parent.Height - Self.Height) / 2
      - conLoadingOverlay:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =Color.Transparent
            Height: =Parent.Height
            Visible: =varIsLoading
            Width: =Parent.Width
          Children:
            - recLoadingOverlay:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorOverlay
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Height: =Parent.Height
                  Width: =Parent.Width
            - recLoadingBg:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Fill: =varColorBgCard
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Width: =200
                  X: =(Parent.Width - 200) / 2
                  Y: =(Parent.Height - 100) / 2
            - lblLoadingText:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  BorderColor: =RGBA(0, 18, 107, 1)
                  Color: =varColorPrimary
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Font: =varAppFont
                  Height: =30
                  Size: =14
                  Text: ="Submitting..."
                  Width: =recLoadingBg.Width
                  X: =recLoadingBg.X
                  Y: =recLoadingBg.Y + 35
      - conFormArea:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =varColorBg
            Height: =Parent.Height - varHeaderHeight - varNavHeight
            Width: =Parent.Width
            Y: =varHeaderHeight
          Children:
            - frmSubmit:
                Control: Form@2.4.4
                Variant: Classic
                Layout: Vertical
                Properties:
                  BorderColor: =RGBA(0, 18, 107, 1)
                  DataSource: =PrintRequests
                  DefaultMode: =FormMode.New
                  FocusedBorderThickness: =varFocusedBorderThickness
                  Height: =561
                  OnFailure: |-
                    =Set(varIsLoading, false);
                    Notify(
                        "Error: " & frmSubmit.Error,
                        NotificationType.Error,
                        5000
                    )
                  OnSuccess: |-
                    =Set(varIsLoading, false);
                    Set(varSubmitAttempted, false);  // Reset for next submission
                    Notify("Request submitted successfully! You'll receive a confirmation email shortly.", NotificationType.Success);
                    ResetForm(frmSubmit);
                    Navigate(scrMyRequests, varScreenTransition)
                  SnapToColumns: =false
                  Width: =Parent.Width - (varSpacingXL * 2)
                  X: =varSpacingXL
                  Y: =9
                Children:
                  - dcImportantInfo:
                      Control: TypedDataCard@1.0.7
                      Variant: BlankCard
                      Properties:
                        BorderColor: =Color.White
                        BorderThickness: =1
                        DisplayMode: =DisplayMode.View
                        Width: =1320
                        X: =0
                        Y: =0
                      Children:
                        - lblImportantInfo:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =varColorWarning
                              BorderThickness: =varInputBorderThickness
                              Color: =RGBA(102, 77, 3, 1)
                              Fill: =RGBA(255, 244, 206, 1)
                              Font: =varAppFont
                              Height: =Parent.Height - (varSpacingMD * 2)
                              Size: =11
                              Text: |-
                                ="Important Information Before Submitting Your 3D Printing Request

                                Before submitting your model for 3D printing, please ensure you have thoroughly reviewed our Additive Manufacturing Moodle page, read all the guides, and checked the checklist. If necessary, revisit and fix your model before submission. Your model must be scaled and simplified appropriately, often requiring a second version specifically optimized for 3D printing.

                                We will not print models that are broken, messy, or too large. Your model must follow the rules and constraints of the machine. We will not fix or scale your model as we do not know your specific needs or project requirements. We print exactly what you send us; if the scale is wrong or you are unsatisfied with the product, it is your responsibility.

                                We will gladly print another model for you at an additional cost. We are only responsible for print failures due to issues under our control."
                              Width: =Parent.Width - (varSpacingMD * 2)
                              X: =varSpacingMD
                              Y: =varSpacingMD
                  - Title_DataCard1:
                      Control: TypedDataCard@1.0.7
                      Variant: ClassicTextualEdit
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataField: ="Title"
                        Default: =ThisItem.Title
                        DisplayName: =DataSourceInfo([@PrintRequests],DataSourceInfo.DisplayName,Title)
                        MaxLength: =DataSourceInfo([@PrintRequests], DataSourceInfo.MaxLength, Title)
                        Required: =false
                        Update: =DataCardValue1.Text
                        Visible: =false
                        Width: =221
                        X: =1
                        Y: =0
                      Children:
                        - DataCardKey1:
                            Control: Label@2.5.1
                            MetadataKey: FieldName
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              Height: =34
                              Text: =Parent.DisplayName
                              Width: =Parent.Width - 60
                              Wrap: =false
                              X: =30
                              Y: =10
                        - DataCardValue1:
                            Control: Classic/TextInput@2.3.2
                            MetadataKey: FieldValue
                            Properties:
                              BorderColor: =If(IsBlank(Parent.Error), Parent.BorderColor, Color.Red)
                              Default: =Parent.Default
                              DelayOutput: =true
                              DisplayMode: =Parent.DisplayMode
                              Font: =Font.'Open Sans'
                              HoverBorderColor: =RGBA(0, 18, 107, 1)
                              HoverFill: =RGBA(186, 202, 226, 1)
                              MaxLength: =Parent.MaxLength
                              PaddingLeft: =5
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Tooltip: =Parent.DisplayName
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardKey1.Y + DataCardKey1.Height + 5
                        - ErrorMessage1:
                            Control: Label@2.5.1
                            MetadataKey: ErrorMessage
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(168, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =10
                              Live: =Live.Assertive
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: =Parent.Error
                              Visible: =Parent.DisplayMode=DisplayMode.Edit
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardValue1.Y + DataCardValue1.Height
                        - StarVisible1:
                            Control: Label@2.5.1
                            MetadataKey: FieldRequired
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              Height: =DataCardKey1.Height
                              Text: ="*"
                              Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                              Width: =30
                              Wrap: =false
                              Y: =DataCardKey1.Y
                  - Student_DataCard1:
                      Control: TypedDataCard@1.0.7
                      Variant: ClassicComboBoxEdit
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataField: ="Student"
                        Default: =ThisItem.Student
                        DisplayMode: =DisplayMode.View
                        DisplayName: =DataSourceInfo([@PrintRequests],DataSourceInfo.DisplayName,Student)
                        Required: =true
                        Update: |-
                          ={
                              '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                              Claims: "i:0#.f|membership|" & varMeUPN,
                              DisplayName: varMeName,
                              Email: varMeEmail
                          }
                        Width: =442
                        X: =2
                        Y: =0
                      Children:
                        - DataCardKey3:
                            Control: Label@2.5.1
                            MetadataKey: FieldName
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(51, 51, 51, 1)
                              Font: =varAppFont
                              FontWeight: =FontWeight.Bold
                              Height: =34
                              Text: =Parent.DisplayName
                              Width: =Parent.Width - 60
                              Wrap: =false
                              X: =30
                              Y: =10
                        - DataCardValue3:
                            Control: Classic/ComboBox@2.4.0
                            MetadataKey: FieldValue
                            Properties:
                              BorderColor: =If(IsBlank(Parent.Error), Parent.BorderColor, Color.Red)
                              ChevronBackground: =RGBA(56, 96, 178, 1)
                              ChevronFill: =RGBA(255, 255, 255, 1)
                              ChevronHoverBackground: =ColorFade(RGBA(56, 96, 178, 1), -20%)
                              ChevronHoverFill: =RGBA(255, 255, 255, 1)
                              DefaultSelectedItems: =Parent.Default
                              DisplayFields: =["DisplayName"]
                              DisplayMode: =Parent.DisplayMode
                              Font: =Font.'Open Sans'
                              HoverFill: =RGBA(186, 202, 226, 1)
                              InputTextPlaceholder: ="Search for your name"
                              Items: =Choices([@PrintRequests].Student)
                              PaddingLeft: =If(Self.DisplayMode = DisplayMode.Edit, 5, 0)
                              PressedColor: =RGBA(255, 255, 255, 1)
                              PressedFill: =RGBA(0, 18, 107, 1)
                              SearchFields: =["DisplayName","Email"]
                              SelectMultiple: =false
                              SelectionColor: =RGBA(255, 255, 255, 1)
                              SelectionFill: =RGBA(56, 96, 178, 1)
                              Tooltip: =Parent.DisplayName
                              Visible: =false
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardKey3.Y + DataCardKey3.Height + 5
                        - ErrorMessage3:
                            Control: Label@2.5.1
                            MetadataKey: ErrorMessage
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(168, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =10
                              Live: =Live.Assertive
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: =Parent.Error
                              Visible: =Parent.DisplayMode=DisplayMode.Edit
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardValue3.Y + DataCardValue3.Height
                        - StarVisible3:
                            Control: Label@2.5.1
                            MetadataKey: FieldRequired
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              Height: =DataCardKey3.Height
                              Text: ="*"
                              Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                              Width: =30
                              Wrap: =false
                              Y: =DataCardKey3.Y
                        - lblStudentName:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =varInputBorderColor
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =varInputBorderThickness
                              FocusedBorderThickness: =varFocusedBorderThickness
                              Font: =varAppFont
                              Size: =12
                              Text: =varMeName
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardKey3.Y + DataCardKey3.Height + 5
                  - StudentEmail_DataCard1:
                      Control: TypedDataCard@1.0.7
                      Variant: ClassicTextualEdit
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataField: ="StudentEmail"
                        Default: =ThisItem.StudentEmail
                        DisplayName: ="Student Email"
                        MaxLength: =DataSourceInfo([@PrintRequests], DataSourceInfo.MaxLength, StudentEmail)
                        Required: =false
                        Update: =varMeEmail
                        Width: =440
                        X: =3
                        Y: =0
                      Children:
                        - DataCardKey4:
                            Control: Label@2.5.1
                            MetadataKey: FieldName
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(51, 51, 51, 1)
                              Font: =varAppFont
                              FontWeight: =FontWeight.Bold
                              Height: =34
                              Text: =Parent.DisplayName
                              Width: =Parent.Width - 60
                              Wrap: =false
                              X: =30
                              Y: =10
                        - DataCardValue4:
                            Control: Classic/TextInput@2.3.2
                            MetadataKey: FieldValue
                            Properties:
                              BorderColor: =If(IsBlank(Parent.Error), Parent.BorderColor, Color.Red)
                              BorderThickness: =varInputBorderThickness
                              Default: =varMeEmail
                              DelayOutput: =true
                              DisplayMode: =DisplayMode.View
                              FocusedBorderThickness: =varFocusedBorderThickness
                              Font: =varAppFont
                              HoverBorderColor: =RGBA(0, 18, 107, 1)
                              HoverFill: =RGBA(186, 202, 226, 1)
                              MaxLength: =Parent.MaxLength
                              PaddingLeft: =5
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Tooltip: =Parent.DisplayName
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardKey4.Y + DataCardKey4.Height + 5
                        - ErrorMessage4:
                            Control: Label@2.5.1
                            MetadataKey: ErrorMessage
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(168, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =10
                              Live: =Live.Assertive
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: =Parent.Error
                              Visible: =Parent.DisplayMode=DisplayMode.Edit
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardValue4.Y + DataCardValue4.Height
                        - StarVisible4:
                            Control: Label@2.5.1
                            MetadataKey: FieldRequired
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(0, 18, 107, 1)
                              Font: =Font.'Open Sans'
                              Height: =DataCardKey4.Height
                              Text: ="*"
                              Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                              Width: =30
                              Wrap: =false
                              Y: =DataCardKey4.Y
                  - TigerCardNumber_DataCard1:
                      Control: TypedDataCard@1.0.7
                      Variant: ClassicTextualEdit
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataField: ="TigerCardNumber"
                        Default: =ThisItem.TigerCardNumber
                        DisplayName: ="TigerCard Number"
                        Height: =240
                        MaxLength: =16
                        Required: =true
                        Update: =DataCardValue30.Text
                        Width: =442
                        X: =0
                        Y: =1
                      Children:
                        - DataCardKey31:
                            Control: Label@2.5.1
                            MetadataKey: FieldName
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(51, 51, 51, 1)
                              Font: =varAppFont
                              FontWeight: =FontWeight.Bold
                              Height: =34
                              Text: =Parent.DisplayName
                              Width: =171
                              Wrap: =false
                              X: =30
                              Y: =10
                        - DataCardValue30:
                            Control: Classic/TextInput@2.3.2
                            MetadataKey: FieldValue
                            Properties:
                              BorderColor: =varInputBorderColor
                              BorderThickness: =varInputBorderThickness
                              Default: =Parent.Default
                              DelayOutput: =true
                              DisplayMode: =Parent.DisplayMode
                              FocusedBorderThickness: =varFocusedBorderThickness
                              Font: =varAppFont
                              HintText: ="16-digit POS number from TigerCard"
                              HoverBorderColor: =ColorFade(Self.BorderColor, 15%)
                              HoverFill: =varDropdownHoverFill
                              MaxLength: =Parent.MaxLength
                              OnChange: |-
                                =If(
                                    !IsBlank(Self.Text) && !IsMatch(Self.Text, "^\d{0,16}$"),
                                    Notify("Tiger Card number must contain only digits", NotificationType.Warning)
                                )
                              PaddingLeft: =5
                              PressedColor: =varDropdownPressedColor
                              PressedFill: =varDropdownPressedFill
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Tooltip: =Parent.DisplayName
                              Width: =382
                              X: =30
                              Y: =DataCardKey31.Y + DataCardKey31.Height + 5
                        - ErrorMessage31:
                            Control: Label@2.5.1
                            MetadataKey: ErrorMessage
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(168, 0, 0, 1)
                              Font: =Font.'Open Sans'
                              FontWeight: =FontWeight.Semibold
                              Height: =10
                              Live: =Live.Assertive
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: =Parent.Error
                              Visible: =Parent.DisplayMode=DisplayMode.Edit
                              Width: =Parent.Width - 60
                              X: =30
                              Y: =DataCardValue30.Y + DataCardValue30.Height
                        - StarVisible31:
                            Control: Label@2.5.1
                            MetadataKey: FieldRequired
                            Properties:
                              Align: =Align.Center
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(51, 51, 51, 1)
                              Font: =varAppFont
                              FontWeight: =FontWeight.Bold
                              Height: =DataCardKey31.Height
                              Text: =
                              Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                              Width: =30
                              Wrap: =false
                              Y: =DataCardKey31.Y
                        - imgTigerCardExample:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Height: =135
                              Image: =TigerCard
                              Width: =214
                              X: =114
                              Y: =99
                        - lblTigerCardError:
                            Control: Label@2.5.1
                            Properties:
                              Align: =Align.Center
                              BorderColor: =varColorDanger
                              BorderThickness: =1
                              Color: =varColorDanger
                              Fill: =RGBA(255, 235, 235, 1)
                              Font: =varAppFont
                              Height: =24
                              Size: =10
                              Text: ="Must be exactly 16 digits"
                              Visible: =!IsBlank(DataCardValue30.Text) && Len(DataCardValue30.Text) <> 16
                              Width: =DataCardValue30.Width
                              X: =DataCardValue30.X
                              Y: =DataCardValue30.Y + DataCardValue30.Height + 4
                        - lblTigerCardRequired:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 18, 107, 1)
                              Color: =varColorDanger
                              Font: =varAppFont
                              Height: =DataCardKey31.Height
                              Italic: =true
                              Size: =12
                              Text: ="(Required)"
                              Visible: =Len(DataCardValue30.Text) <> 16
                              Width: =85
                              X: =DataCardKey31.X + DataCardKey31.Width + 5
                              Y: =DataCardKey31.Y
                  - Discipline_DataCard1:
                      Control: TypedDataCard@1.0.7
                      Variant: ClassicComboBoxEdit
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        DataField: ="Department"
                        Default: =ThisItem.Discipline
                        DisplayName: =DataSourceInfo([@PrintRequests],DataSourceInfo.DisplayName,Discipline)
                        Required: =true
                        Update: =DataCardValue6.Selected
                        Width: =442
                        X: =2
                        Y: =1
                      Children:
                        - DataCardKey6:
                            Control: Label@2.5.1
                            MetadataKey: FieldName
                            Properties:
                              AutoHeight: =true
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(51, 51, 51, 1)
