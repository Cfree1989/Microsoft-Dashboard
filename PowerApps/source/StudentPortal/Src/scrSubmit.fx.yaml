            RadiusBottomLeft: =varRadiusSmall
            RadiusBottomRight: =varRadiusSmall
            RadiusTopLeft: =varRadiusSmall
            RadiusTopRight: =varRadiusSmall
            Text: ="New Request"
            Width: =(Parent.Width - 80) / 3
            X: =(Parent.Width - Self.Width) / 2
            Y: =(Parent.Height - Self.Height) / 2
