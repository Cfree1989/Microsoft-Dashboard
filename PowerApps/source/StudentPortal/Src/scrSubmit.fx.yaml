scrSubmit As screen:
    Fill: =varColorBg

    conHeader As groupContainer.manualLayoutContainer:
        BorderStyle: =BorderStyle.None
        Fill: =Color.Transparent
        Height: =varHeaderHeight
        LayoutGridColumnMinWidth: =0
        LayoutGridColumns: =6
        LayoutGridRowMinHeight: =0
        LayoutGridRows: =6
        Width: =Parent.Width    
        ZIndex: =1

        recHeaderBg As rectangle:
            Fill: =varColorHeader
            FocusedBorderThickness: =varFocusedBorderThickness
            Height: =Parent.Height
            Width: =Parent.Width
            ZIndex: =1

        lblHeaderTitle As label:
            Color: =RGBA(51, 51, 51, 1)
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            FontWeight: =FontWeight.Bold
            Height: =30
            Size: =24
            Text: ="Submit 3D Print Request"
            Width: =Parent.Width - 40
            X: =varSpacingXL
            Y: =(Parent.Height - Self.Height) / 2
            ZIndex: =2

    conNavBar As groupContainer.manualLayoutContainer:
        Fill: =Color.Transparent
        Height: =varNavHeight
        LayoutGridColumnMinWidth: =0
        LayoutGridColumns: =6
        LayoutGridRowMinHeight: =0
        LayoutGridRows: =6
        Width: =Parent.Width
        Y: =Parent.Height - varNavHeight
        ZIndex: =2

        recNavBg As rectangle:
            Fill: =varColorHeader
            FocusedBorderThickness: =varFocusedBorderThickness
            Height: =Parent.Height
            Width: =Parent.Width
            ZIndex: =1

        btnNavHome As button:
            BorderThickness: =0
            Color: =Color.White
            Fill: =varNavBtnInactiveFill
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varButtonHeightSmall
            HoverFill: =varNavBtnHoverFill
            OnSelect: =Navigate(scrHome, varScreenTransition)
            RadiusBottomLeft: =varRadiusSmall
            RadiusBottomRight: =varRadiusSmall
            RadiusTopLeft: =varRadiusSmall
            RadiusTopRight: =varRadiusSmall
            Text: ="Home"
            Width: =(Parent.Width - 80) / 3
            X: =varSpacingXL
            Y: =(Parent.Height - Self.Height) / 2
            ZIndex: =2

        btnNavSubmit As button:
            BorderThickness: =0
            Color: =Color.White
            Fill: =varColorInfo
            FocusedBorderThickness: =varFocusedBorderThickness
            Font: =varAppFont
            Height: =varButtonHeightSmall
            HoverFill: =ColorFade(varColorPrimary, -15%)
