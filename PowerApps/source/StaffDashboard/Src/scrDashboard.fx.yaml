            OnSelect: |-
                =Set(varShowCompleteModal, 0);
                Set(varSelectedItem, Blank());
                Reset(ddCompleteStaff)
            PressedFill: =ColorFade(varColorNeutral, -25%)
            RadiusBottomLeft: =varBtnBorderRadius
            RadiusBottomRight: =varBtnBorderRadius
