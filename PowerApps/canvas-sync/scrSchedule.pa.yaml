            - galSchedTotals:
                Control: Gallery
                Variant: Vertical
                Properties:
                  Height: =Max(CountRows(colSchedStaff), 1) * 28
                  Items: |-
                    =With(
                        {
                            ord: If(varSchedTotalsSortDesc, SortOrder.Descending, SortOrder.Ascending),
                            totalsRows: ForAll(
                                Sort(colSchedStaff, SchedSortOrder, SortOrder.Ascending) As p,
                                With(
                                    {
                                        mH:   Sum(Filter(colSchedLookup, Email = p.MemberEmail && Day = "Monday" && StartSlot >= 0), (EndSlot - StartSlot) / 2),
                                        tuH:  Sum(Filter(colSchedLookup, Email = p.MemberEmail && Day = "Tuesday" && StartSlot >= 0), (EndSlot - StartSlot) / 2),
                                        wH:   Sum(Filter(colSchedLookup, Email = p.MemberEmail && Day = "Wednesday" && StartSlot >= 0), (EndSlot - StartSlot) / 2),
                                        thH:  Sum(Filter(colSchedLookup, Email = p.MemberEmail && Day = "Thursday" && StartSlot >= 0), (EndSlot - StartSlot) / 2),
                                        fH:   Sum(Filter(colSchedLookup, Email = p.MemberEmail && Day = "Friday" && StartSlot >= 0), (EndSlot - StartSlot) / 2),
                                        maxH: Switch(p.AidType, "Work Study", 12, "Graduate Assistant", 20, 6)
                                    },
                                    {
                                        StaffID:   p.StaffID,
                                        MemberName:p.MemberName,
                                        MemberEmail:p.MemberEmail,
                                        RoleAbbr:  Switch(p.AidType, "Work Study", "WS", "Graduate Assistant", "GA", "President's Aid", "PA", "-"),
                                        MonH:      mH,
                                        TueH:      tuH,
                                        WedH:      wH,
                                        ThuH:      thH,
                                        FriH:      fH,
                                        TotalH:    mH + tuH + wH + thH + fH,
                                        MaxH:      maxH,
                                        RowFill:   Coalesce(LookUp(colSchedColors, Idx = Mod(p.StaffID, 12)).Light, "#f5f0ea")
                                    }
                                )
                            )
                        },
                        Switch(
                            Coalesce(varSchedTotalsSortBy, "Student"),
                            "Role",  Sort(totalsRows, RoleAbbr, ord),
                            "Mon",   Sort(totalsRows, MonH, ord),
                            "Tue",   Sort(totalsRows, TueH, ord),
                            "Wed",   Sort(totalsRows, WedH, ord),
                            "Thu",   Sort(totalsRows, ThuH, ord),
                            "Fri",   Sort(totalsRows, FriH, ord),
                            "Total", Sort(totalsRows, TotalH, ord),
                            "Max",   Sort(totalsRows, MaxH, ord),
                            Sort(totalsRows, MemberName, ord)
                        )
                    )
                  ShowScrollbar: =false
                  TemplatePadding: =0
                  TemplateSize: =28
                  Width: =recSchedTotalsHeader.Width
                  X: =recSchedTotalsHeader.X
                  Y: =recSchedTotalsHeader.Y + recSchedTotalsHeader.Height
                Children:
                  - recSchedTotalsRowBg:
                      Control: Rectangle
                      Properties:
                        Fill: =ColorValue(ThisItem.RowFill)
                        Height: =28
                        Width: =galSchedTotals.Width
                  - lblSchedTotalsStudent:
                      Control: Label
                      Properties:
                        Color: =varColorText
                        Font: =varAppFont
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        Size: =10
                        Text: =ThisItem.MemberName
                        Width: =220
                        X: =8
                  - lblSchedTotalsRole:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =varColorText
                        Font: =varAppFont
                        Height: =28
                        Size: =10
                        Text: =ThisItem.RoleAbbr
                        Width: =70
                        X: =232
                  - lblSchedTotalsMon:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =varColorText
                        Font: =varAppFont
                        Height: =28
                        Size: =10
                        Text: =If(ThisItem.MonH = RoundDown(ThisItem.MonH, 0), Text(ThisItem.MonH, "0"), Text(ThisItem.MonH, "0.#"))
                        Width: =72
                        X: =306
                  - lblSchedTotalsTue:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =varColorText
                        Font: =varAppFont
                        Height: =28
                        Size: =10
                        Text: =If(ThisItem.TueH = RoundDown(ThisItem.TueH, 0), Text(ThisItem.TueH, "0"), Text(ThisItem.TueH, "0.#"))
                        Width: =72
                        X: =382
                  - lblSchedTotalsWed:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =varColorText
                        Font: =varAppFont
                        Height: =28
                        Size: =10
                        Text: =If(ThisItem.WedH = RoundDown(ThisItem.WedH, 0), Text(ThisItem.WedH, "0"), Text(ThisItem.WedH, "0.#"))
                        Width: =72
                        X: =458
                  - lblSchedTotalsThu:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =varColorText
                        Font: =varAppFont
                        Height: =28
                        Size: =10
                        Text: =If(ThisItem.ThuH = RoundDown(ThisItem.ThuH, 0), Text(ThisItem.ThuH, "0"), Text(ThisItem.ThuH, "0.#"))
                        Width: =72
                        X: =534
                  - lblSchedTotalsFri:
                      Control: Label
