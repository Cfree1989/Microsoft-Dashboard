                        Width: =72
                        X: =610
                  - lblSchedTotalsTotal:
                      Control: Label
                      Properties:
                        Align: =Align.Center
                        Color: =If(ThisItem.TotalH > ThisItem.MaxH, varColorDanger, varColorText)
                        Font: =varAppFont
                        FontWeight: =If(ThisItem.TotalH > ThisItem.MaxH, FontWeight.Bold, FontWeight.Normal)
                        Height: =28
                        Size: =10
                        Text: =If(ThisItem.TotalH = RoundDown(ThisItem.TotalH, 0), Text(ThisItem.TotalH, "0"), Text(ThisItem.TotalH, "0.#"))
                        Width: =80
                        X: =686
