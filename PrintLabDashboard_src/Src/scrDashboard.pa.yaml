Screens:
  scrDashboard:
    Properties:
      LoadingSpinnerColor: =varColorPrimary
      OnVisible: |-
        =Set(varActor, {
            '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
            Claims: "i:0#.f|membership|" & varMeEmail,
            Discipline: "",
            DisplayName: varMeName,
            Email: varMeEmail,
            JobTitle: "",
            Picture: ""
        })
    Children:
      - recHeader:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =varColorBorder
            Fill: =RGBA(45, 45, 48, 1)
            Height: =60
            Width: =Parent.Width
      - lblAppTitle:
          Control: Label@2.5.1
          Properties:
            BorderColor: =varColorBorder
            Color: =RGBA(255, 255, 255, 1)
            Font: =varAppFont
            FontWeight: =FontWeight.Semibold
            Height: =30
            Size: =18
            Text: ="Print Lab Dashboard [BUILD: B4-MARKER]"
            Width: =300
            X: =20
            Y: =15
      - btnNavDashboard:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =If(varCurrentPage = "Dashboard", varColorPrimary, varNavBtnInactiveFill)
            Font: =varAppFont
            Height: =36
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =varNavBtnHoverFill
            OnSelect: =Set(varCurrentPage, "Dashboard")
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Dashboard"
            Width: =120
            X: =300
            Y: =12
      - btnNavAdmin:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =If(varCurrentPage = "Admin", varColorPrimary, varNavBtnInactiveFill)
            Font: =varAppFont
            Height: =36
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =varNavBtnHoverFill
            OnSelect: =Notify("Admin features coming soon!", NotificationType.Information)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Admin"
            Width: =120
            X: =430
            Y: =12
      - btnNavAnalytics:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =ColorFade(Self.Fill, -15%)
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(166, 166, 166, 1)
            Fill: =If(varCurrentPage = "Analytics", varColorPrimary, varNavBtnInactiveFill)
            Font: =varAppFont
            Height: =36
            HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =varNavBtnHoverFill
            OnSelect: =Notify("Analytics features coming soon!", NotificationType.Information)
            PressedBorderColor: =Self.Fill
            PressedColor: =Self.Fill
            PressedFill: =Self.Color
            Text: ="Analytics"
            Width: =120
            X: =560
            Y: =12
      - lblUserName:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            BorderColor: =varColorBorder
            Color: =varColorBorder
            Font: =varAppFont
            Height: =24
            Size: =12
            Text: =varMeName
            Width: =200
            X: =Parent.Width - 216
            Y: =18
      - galStatusTabs:
          Control: Gallery@2.15.0
          Variant: Horizontal
          Properties:
            BorderColor: =varColorBorder
            Height: =50
            Items: |-
              =Table(
                  {Status: "Uploaded", Color: RGBA(70, 130, 220, 1)},
                  {Status: "Pending", Color: RGBA(255, 185, 0, 1)},
                  {Status: "Ready to Print", Color: RGBA(16, 124, 16, 1)},
                  {Status: "Printing", Color: RGBA(107, 105, 214, 1)},
                  {Status: "Completed", Color: RGBA(0, 78, 140, 1)},
                  {Status: "Paid & Picked Up", Color: RGBA(0, 158, 73, 1)},
                  {Status: "Rejected", Color: RGBA(209, 52, 56, 1)},
                  {Status: "Canceled", Color: RGBA(138, 136, 134, 1)},
                  {Status: "Archived", Color: RGBA(96, 94, 92, 1)}
              )
            TemplatePadding: =3
            TemplateSize: =varTabGalleryHeight
            Width: =Parent.Width
            Y: =60
          Children:
            - btnStatusTab:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: |-
                    =If(
                        varSelectedStatus = ThisItem.Status, 
                        If(ThisItem.Status = "Pending", Color.Black, Color.White),
                        varColorTextMuted
                    )
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =If(varSelectedStatus = ThisItem.Status, ThisItem.Color, RGBA(245, 245, 245, 1))
                  Font: =varAppFont
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varNavBtnHoverFill
                  OnSelect: =Set(varSelectedStatus, ThisItem.Status)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  Size: =11
                  Text: =ThisItem.Status & " " & Text(CountRows(Filter(PrintRequests, Status.Value = ThisItem.Status)))
                  Width: =138
                  X: =5
                  Y: =4
      - lblEmptyState:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            BorderColor: =varColorBorder
            Color: =varColorTextLight
            Font: =varAppFont
            Height: =100
            Size: =14
            Text: ="No " & varSelectedStatus & " requests found"
            Visible: =CountRows(galJobCards.AllItems) = 0
            Width: =400
            X: =(Parent.Width - 400) / 2
            Y: =350
      - galJobCards:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderColor: =varColorBorder
            Height: =Parent.Height - 160
            Items: |-
              =SortByColumns(
                  Filter(
                      PrintRequests,
                      // Filter by selected status tab (use .Value for Choice fields)
                      Status.Value = varSelectedStatus,
                      // Search filter (searches name and email)
                      If(
                          IsBlank(varSearchText), 
                          true, 
                          varSearchText in Student.DisplayName || varSearchText in StudentEmail || varSearchText in ReqKey
                      ),
                      // Needs attention filter
                      If(varNeedsAttention, NeedsAttention = true, true)
                  ),
                  "NeedsAttention", SortOrder.Descending,  // Attention items first (true > false)
                  "Created", SortOrder.Ascending            // Then oldest first (longest in queue)
              )
            TemplatePadding: =8
            TemplateSize: =varCardGalleryHeight
            Width: =Parent.Width
            WrapCount: =4
            Y: =160
          Children:
            - recCardBackground:
                Control: Rectangle@2.3.0
                Properties:
                  BorderColor: =If(ThisItem.NeedsAttention, RGBA(255, 180, 0, 1), RGBA(220, 220, 220, 1))
                  BorderThickness: =If(ThisItem.NeedsAttention, 2, 1)
                  Fill: =If(ThisItem.NeedsAttention, RGBA(255, 235, 180, 1), Color.White)
                  Height: =Parent.TemplateHeight - 8
                  OnSelect: =Select(Parent)
                  Width: =Parent.TemplateWidth
                  Y: =8
            - lblStudentName:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =24
                  OnSelect: =Select(Parent)
                  Size: =14
                  Text: =ThisItem.Student.DisplayName
                  Width: =Parent.TemplateWidth - 50
                  X: =12
                  Y: =14
            - lblSubmittedTime:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Right
                  BorderColor: =varColorBorder
                  Color: =varColorDanger
                  Font: =varAppFont
                  Height: =44
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: |-
                    =If(
                        DateDiff(ThisItem.Created, Now(), TimeUnit.Minutes) < 1,
                        "Just now",
                        "Submitted " &
                        If(
                            DateDiff(ThisItem.Created, Now(), TimeUnit.Days) > 0,
                            Text(DateDiff(ThisItem.Created, Now(), TimeUnit.Days)) & "d ",
                            ""
                        ) &
                        If(
                            Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Hours), 24) > 0,
                            Text(Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Hours), 24)) & "h ",
                            ""
                        ) &
                        Text(Mod(DateDiff(ThisItem.Created, Now(), TimeUnit.Minutes), 60)) & "m ago"
                    )
                  Width: =99
                  X: =200
                  Y: =8
            - lblFilename:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextMuted
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =9
                  Text: =ThisItem.Student.DisplayName & "_" & ThisItem.Method.Value & "_" & ThisItem.Color.Value
                  Width: =Parent.TemplateWidth - 24
                  X: =13
                  Y: =70
            - lblStudentEmail:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextMuted
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =9
                  Text: ="✉ " & ThisItem.StudentEmail
                  Width: =Parent.TemplateWidth / 2 - 16
                  X: =13
                  Y: =47
            - lblPrinter:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextMuted
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: |-
                    ="🖨 " & Trim(If(Find("(", ThisItem.Printer.Value) > 0, Left(ThisItem.Printer.Value, Find("(", ThisItem.Printer.Value) - 1), ThisItem.Printer.Value))
                  Width: =99
                  X: =101
                  Y: =97
            - lblColor:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: |-
                    =Switch(
                        ThisItem.Color.Value,
                        "Black", RGBA(26, 26, 26, 1),
                        "White", RGBA(180, 180, 180, 1),
                        "Gray", RGBA(128, 128, 128, 1),
                        "Red", RGBA(204, 0, 0, 1),
                        "Orange", RGBA(255, 102, 0, 1),
                        "Yellow", RGBA(255, 215, 0, 1),
                        "Green", RGBA(76, 175, 80, 1),
                        "Forest Green", RGBA(34, 139, 34, 1),
                        "Blue", RGBA(0, 102, 204, 1),
                        "Purple", RGBA(107, 63, 160, 1),
                        "Brown", RGBA(93, 64, 55, 1),
                        "Chocolate Brown", RGBA(123, 63, 0, 1),
                        "Copper", RGBA(184, 115, 51, 1),
                        "Bronze", RGBA(205, 127, 50, 1),
                        "Silver", RGBA(192, 192, 192, 1),
                        "Clear", RGBA(245, 245, 245, 1),
                        "Any", RGBA(224, 224, 224, 1),
                        RGBA(153, 153, 153, 1)
                    )
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =10
                  Text: ="⬤ " & ThisItem.Color.Value
                  X: =13
                  Y: =97
            - lblEstimates:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextMuted
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =10
                  Text: |-
                    =If(
                        ThisItem.Status.Value = "Paid & Picked Up" && !IsBlank(ThisItem.FinalCost),
                        // After payment: show final weight and cost only
                        "⚖ " & Text(ThisItem.FinalWeight) & "g · 💲" & Text(ThisItem.FinalCost, "[$-en-US]#,##0.00"),
                        // Before payment: show estimates
                        If(
                            !IsBlank(ThisItem.EstimatedWeight),
                            "⚖ " & Text(ThisItem.EstimatedWeight) & "g" &
                            If(!IsBlank(ThisItem.EstimatedTime), " · ⏱ ~" & Text(ThisItem.EstimatedTime) & "h", "") &
                            If(!IsBlank(ThisItem.EstimatedCost), " · 💲" & Text(ThisItem.EstimatedCost, "[$-en-US]#,##0.00"), ""),
                            ""
                        )
                    )
                  Visible: =!IsBlank(ThisItem.EstimatedWeight) || !IsBlank(ThisItem.FinalWeight)
                  Width: =Parent.TemplateWidth - 24
                  X: =12
                  Y: =122
            - btnViewNotes:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Color.Transparent
                  BorderThickness: =0
                  Color: =varColorNeutral
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =ColorFade(varColorNeutral, varSecondaryFade)
                  Font: =varAppFont
                  Height: =25
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorNeutral, 55%)
                  OnSelect: |-
                    =Set(varShowNotesModal, ThisItem.ID);
                    Set(varSelectedItem, ThisItem)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(varColorNeutral, 45%)
                  RadiusBottomLeft: =varBtnBorderRadius
                  RadiusBottomRight: =varBtnBorderRadius
                  RadiusTopLeft: =varBtnBorderRadius
                  RadiusTopRight: =varBtnBorderRadius
                  Size: =9
                  Text: ="Staff Notes"
                  Width: =75
                  X: =242
                  Y: =73
            - lblJobId:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: =ThisItem.ReqKey
                  Width: =120
                  X: =80
                  Y: =189
            - lblcreated:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =28
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: =Text(ThisItem.Created, "mmm dd, yyyy hh:mm AM/PM")
                  Width: =98
                  X: =Parent.TemplateWidth / 2 + 55
                  Y: =181
            - lblDetailsHeader:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  FontWeight: =FontWeight.Semibold
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =11
                  Text: ="Details"
                  X: =12
                  Y: =165
            - lblJobIdLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextLight
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: ="Job ID"
                  Width: =65
                  X: =12
                  Y: =189
            - lblCreatedLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextLight
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: ="Created:"
                  Width: =55
                  X: =Parent.TemplateWidth / 2
                  Y: =185
            - lblDisciplineLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextLight
                  Font: =varAppFont
                  Height: =20
                  Size: =8
                  Text: ="Discipline:"
                  Width: =65
                  X: =12
                  Y: =213
            - lblDiscipline:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: =ThisItem.Discipline.Value
                  Width: =120
                  X: =80
                  Y: =213
            - lblProjectTypeLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextLight
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: ="Project:"
                  Width: =50
                  X: =167
                  Y: =213
            - lblProjectType:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: =ThisItem.ProjectType.Value
                  Width: =99
                  X: =219
                  Y: =213
            - lblCourseLabel:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorTextLight
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: ="Course:"
                  Width: =65
                  X: =12
                  Y: =237
            - lblCourse:
                Control: Label@2.5.1
                Properties:
                  BorderColor: =varColorBorder
                  Color: =varColorText
                  Font: =varAppFont
                  Height: =20
                  OnSelect: =Select(Parent)
                  Size: =8
                  Text: =Coalesce(Text(ThisItem.'Course Number'), "—")
                  X: =80
                  Y: =237
            - icoLightbulb:
                Control: Classic/Icon@2.5.0
                Properties:
                  BorderColor: =varColorBorder
                  Color: =If(ThisItem.NeedsAttention, RGBA(255, 215, 0, 1), RGBA(180, 180, 180, 1))
                  Height: =24
                  Icon: =Icon.Lightbulb
                  OnSelect: |-
                    =Patch(PrintRequests, ThisItem, {NeedsAttention: !ThisItem.NeedsAttention});
                    // When marking as needing attention, play notification sound (Reset + true so it plays)
                    If(!ThisItem.NeedsAttention, Reset(audNotification); Set(varPlaySound, true))
                  Tooltip: =If(ThisItem.NeedsAttention, "Mark as handled", "Mark as needing attention")
                  Width: =24
                  X: =Parent.TemplateWidth - 30
                  Y: =16
            - btnApprove:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Color.Transparent
                  BorderThickness: =0
                  Color: =varColorSuccess
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =ColorFade(varColorSuccess, varSecondaryFade)
                  Font: =varAppFont
                  Height: =varBtnHeight
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorSuccess, 55%)
                  OnSelect: |-
                    =Set(varShowApprovalModal, ThisItem.ID);
                    Set(varSelectedItem, ThisItem)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(varColorSuccess, 45%)
                  RadiusBottomLeft: =varBtnBorderRadius
                  RadiusBottomRight: =varBtnBorderRadius
                  RadiusTopLeft: =varBtnBorderRadius
                  RadiusTopRight: =varBtnBorderRadius
                  Size: =varBtnFontSize
                  Text: ="✓ Approve"
                  Width: =(Parent.TemplateWidth - 40) / 3
                  X: =12
                  Y: =Parent.TemplateHeight - varBtnHeight - 12
            - btnReject:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =varColorDanger
                  BorderThickness: =1
                  Color: =varColorDanger
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =Color.White
                  Font: =varAppFont
                  Height: =32
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =varColorPrimaryHover
                  OnSelect: |-
                    =Set(varShowRejectModal, ThisItem.ID);
                    Set(varSelectedItem, ThisItem)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Size: =10
                  Text: ="✗ Reject"
                  Visible: =Or(ThisItem.Status.Value = "Uploaded", ThisItem.Status.Value = "Pending")
                  Width: =(Parent.TemplateWidth - 40) / 3
                  X: =12 + (Parent.TemplateWidth - 40) / 3 + 4
                  Y: =Parent.TemplateHeight - varBtnHeight - 12
            - btnArchive:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Color.Transparent
                  BorderThickness: =0
                  Color: =varColorWarning
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =ColorFade(varColorWarning, varSecondaryFade)
                  Font: =varAppFont
                  Height: =varBtnHeight
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorWarning, 55%)
                  OnSelect: |-
                    =Set(varShowArchiveModal, ThisItem.ID);
                    Set(varSelectedItem, ThisItem)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(varColorWarning, 45%)
                  RadiusBottomLeft: =varBtnBorderRadius
                  RadiusBottomRight: =varBtnBorderRadius
                  RadiusTopLeft: =varBtnBorderRadius
                  RadiusTopRight: =varBtnBorderRadius
                  Size: =varBtnFontSize
                  Text: |-
                    ="📦 Archive"
                  Visible: =ThisItem.Status.Value in ["Completed", "Paid & Picked Up", "Rejected"]
                  Width: =(Parent.TemplateWidth - 40) / 3
                  X: =223
                  Y: =360
            - btnStartPrint:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Color.Transparent
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varColorPrimary
                  Font: =varAppFont
                  Height: =varBtnHeight
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorPrimary, -15%)
                  OnSelect: |-
                    =// === SHOW LOADING ===
                    Set(varIsLoading, true);
                    Set(varLoadingMessage, "Starting print...");

                    // Store reference to current item before async operations
                    Set(varCurrentItem, ThisItem);

                    Patch(PrintRequests, varCurrentItem, {
                        Status: LookUp(Choices(PrintRequests.Status), Value = "Printing"),
                        LastAction: LookUp(Choices(PrintRequests.LastAction), Value = "Status Change"),
                        LastActionAt: Now(),
                        LastActionBy: {
                            Claims: "i:0#.f|membership|" & User().Email,
                            Discipline: "",
                            DisplayName: User().FullName,
                            Email: User().Email,
                            JobTitle: "",
                            Picture: ""
                        }
                    });

                    'Flow-(C)-Action-LogAction'.Run(
                        Text(varCurrentItem.ID),      // RequestID
                        "Status Change",              // Action
                        "Status",                     // FieldName
                        "Printing",                   // NewValue
                        varMeEmail                    // ActorEmail
                    );

                    Notify("Print started!", NotificationType.Success);

                    // === HIDE LOADING ===
                    Set(varIsLoading, false);
                    Set(varLoadingMessage, "")
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(varColorPrimary, -25%)
                  RadiusBottomLeft: =varBtnBorderRadius
                  RadiusBottomRight: =varBtnBorderRadius
                  RadiusTopLeft: =varBtnBorderRadius
                  RadiusTopRight: =varBtnBorderRadius
                  Size: =varBtnFontSize
                  Text: ="Start Print"
                  Visible: =ThisItem.Status.Value = "Ready to Print"
                  Width: =Parent.TemplateWidth - 24
                  X: =12
                  Y: =Parent.TemplateHeight - varBtnHeight - 12
            - btnComplete:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =Color.Transparent
                  BorderThickness: =0
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =varColorPrimary
                  Font: =varAppFont
                  Height: =varBtnHeight
                  HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                  HoverColor: =RGBA(255, 255, 255, 1)
                  HoverFill: =ColorFade(varColorPrimary, -15%)
                  OnSelect: |-
                    =// === SHOW LOADING ===
                    Set(varIsLoading, true);
                    Set(varLoadingMessage, "Completing print...");

                    // Store reference to current item before async operations
                    Set(varCurrentItem, ThisItem);

                    Patch(PrintRequests, varCurrentItem, {
                        Status: LookUp(Choices(PrintRequests.Status), Value = "Completed"),
                        LastAction: LookUp(Choices(PrintRequests.LastAction), Value = "Status Change"),
                        LastActionAt: Now(),
                        LastActionBy: {
                            Claims: "i:0#.f|membership|" & User().Email,
                            Discipline: "",
                            DisplayName: User().FullName,
                            Email: User().Email,
                            JobTitle: "",
                            Picture: ""
                        }
                    });

                    'Flow-(C)-Action-LogAction'.Run(
                        Text(varCurrentItem.ID),      // RequestID
                        "Status Change",              // Action
                        "Status",                     // FieldName
                        "Completed",                  // NewValue
                        varMeEmail                    // ActorEmail
                    );

                    Notify("Marked as completed!", NotificationType.Success);

                    // === HIDE LOADING ===
                    Set(varIsLoading, false);
                    Set(varLoadingMessage, "")
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =ColorFade(varColorPrimary, -25%)
