                        RGBA(100, 100, 100, 1)
                    )
                  Font: =varAppFont
                  Height: =22
                  Size: =8
                  Text: =Len(txtMessageBody.Text) & " / 2000" & If(Len(txtMessageBody.Text) > 1900, " ⚠️ Near limit!", "")
                  Width: =130
                  X: =recMessageModal.X + 430
                  Y: =recMessageModal.Y + 408
            - btnMessageCancel:
                Control: Classic/Button@2.2.0
                Properties:
                  BorderColor: =ColorFade(Self.Fill, -15%)
                  Color: =Color.White
                  DisabledBorderColor: =RGBA(166, 166, 166, 1)
                  Fill: =RGBA(150, 150, 150, 1)
