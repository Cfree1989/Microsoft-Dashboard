            - txtStaffNotesContent:
                Control: Classic/TextInput@2.3.2
                Properties:
                  BorderColor: =varColorBorder
                  Color: =If(IsBlank(varSelectedItem.StaffNotes), RGBA(150, 150, 150, 1), RGBA(50, 50, 50, 1))
                  Default: |-
                    =If(
                        IsBlank(varSelectedItem.StaffNotes),
                        "None",
                        Concat(
                            ForAll(
                                Split(varSelectedItem.StaffNotes, " | ") As entry,
                                With(
                                    {
                                        text: entry.Value,
                                        dashParts: Split(entry.Value, " - ")
                                    },
                                    With(
                                        {
                                            datetime: Last(dashParts).Value,
                                            beforeDatetime: Left(text, Max(0, Len(text) - Len(Last(dashParts).Value) - 3)),
                                            byPos: Find(" by ", text),
                                            colonPos: Find(":", text)
                                        },
                                        With(
                                            {
                                                action: If(byPos > 0 && byPos < colonPos, Upper(Left(text, byPos - 1)), "NOTE"),
                                                rawName: If(
                                                    byPos > 0 && colonPos > byPos + 4,
                                                    Trim(Mid(text, byPos + 4, Max(0, colonPos - byPos - 4))),
                                                    If(colonPos > 1, Trim(Left(text, colonPos - 1)), "")
                                                ),
                                                details: If(colonPos > 0 && Len(beforeDatetime) > colonPos + 1, Trim(Mid(beforeDatetime, colonPos + 2, Max(0, Len(beforeDatetime) - colonPos - 1))), "")
                                            },
                                            With(
                                                {
                                                    // Convert any name to "First L." format
                                                    shortName: If(
                                                        Find(" ", rawName) > 0,
                                                        Left(rawName, Find(" ", rawName) - 1) & " " & Left(Last(Split(rawName, " ")).Value, 1) & ".",
                                                        rawName
                                                    )
                                                },
                                                datetime & " - " & action & Char(10) &
                                                shortName & Char(10) &
                                                If(
                                                    Len(details) > 0,
                                                    If(
                                                        action = "NOTE",
                                                        // Manual note - quote the whole thing
                                                        """" & details & """",
                                                        // Action entry - only quote the comment part after " - " if present
                                                        If(
                                                            Find(" - ", details) > 0,
                                                            Left(details, Max(0, Find(" - ", details) - 1)) & " - """ & Mid(details, Find(" - ", details) + 3, Max(0, Len(details) - Find(" - ", details) - 2)) & """",
                                                            details
                                                        )
                                                    ),
                                                    ""
                                                ) &
                                                Char(10)
                                            )
                                        )
                                    )
                                )
                            ),
                            Value,
                            Char(10)
                        )
                    )
                  DisplayMode: =DisplayMode.View
