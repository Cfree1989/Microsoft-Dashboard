                                       ddDetailsMethod.Selected.Value, 
                                       varSelectedItem.Method.Value)
                        },
                        If(
                            IsBlank(weight) || weight <= 0,
                            "$" & Text(varMinimumCost, "[$-en-US]#,##0.00") & " (min)",
                            "$" & Text(
                                Max(varMinimumCost, weight * If(method = "Resin", varResinRate, varFilamentRate)),
