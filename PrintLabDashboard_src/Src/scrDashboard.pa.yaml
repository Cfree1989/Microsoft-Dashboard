                  OnSelect: |-
                    =Set(varShowMessageModal, 0);
                    Set(varSelectedItem, Blank());
                    Reset(txtMessageSubject);
                    Reset(txtMessageBody);
                    Reset(ddMessageStaff)
                  PressedBorderColor: =Self.Fill
                  PressedColor: =Self.Fill
                  PressedFill: =Self.Color
                  RadiusBottomLeft: =6
                  RadiusBottomRight: =6
                  RadiusTopLeft: =6
                  RadiusTopRight: =6
